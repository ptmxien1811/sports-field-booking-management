
{% extends "layout/base.html" %}

{% block title %}Sân Thể Thao Nổi Bật{% endblock %}

{% block content %}
<div class="container py-4">
    <h1 class="text-center fw-bold mb-5" style="color: #003366;">
        <i class="fa-solid fa-fire" style="color: #ff4500"></i>
        MỤC NỔI BẬT
        <i class="fa-solid fa-fire" style="color: #ff4500"></i>
    </h1>

    <div class="row g-4">
        {% for p in products %}
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card h-100 shadow-sm border-0 featured-card">
                <div class="position-relative" style="height: 200px;">
                    <img src="{{ url_for('static', filename='image/' + p.image) }}"
                         class="card-img-top w-100 h-100"
                         style="object-fit: cover;" alt="{{ p.name }}">
                    <span class="hot-label">HOT</span>
                </div>

                <div class="card-body d-flex flex-column text-center">
                    <h5 class="card-title fw-bold" style="color: #333;">{{ p.name }}</h5>
                    <p class="card-text text-danger fw-bold fs-4">{{ "{:,.0f}".format(p.price) }}đ</p>
                    <a href="{{ url_for('venue_detail', id=p.id) }}" class="text-decoration-none">
                    <button class="btn btn-booking-custom w-100 mt-auto fw-bold py-2 shadow-sm">
                        ĐẶT LỊCH
                    </button>
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sân Thể Thao Nổi Bật</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="featured-page">

    <div class="wrapper">
        <h1 class="main-title">
            <i class="fa-solid fa-fire" style="color: #ff4500"></i> MỤC NỔI BẬT <i class="fa-solid fa-fire" style="color: #ff4500"></i>
        </h1>

        <div class="product-grid">
            {% for p in products %}
            <div class="product-card">
                <div class="card-image">
                    <img src="{{ url_for('static', filename='image/' + p.image) }}" alt="{{ p.name }}">
                    <span class="hot-label">HOT</span>
                </div>

                <div class="card-content">
                    <h3>{{ p.name }}</h3>
                    <p class="price">{{ "{:,.0f}".format(p.price) }}đ</p>
                    <button class="btn-booking" onclick="window.location.href='/booking/{{ p.id }}'">
                        ĐẶT LỊCH
                    </button>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    {% include 'layout/footer.html' %}

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Báo cáo doanh thu</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/stats.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<h1>BÁO CÁO DOANH THU</h1>

<div class="filter-box">
    <form method="GET" action="/stats" class="date-filter-form">
        <div class="date-group">
            <label>Từ</label>
            <input type="date" id="start_date" name="start_date" value="{{ start_date }}" max="{{ today }}">
        </div>

        <div class="date-group">
            <label>Đến</label>
            <input type="date" id="end_date" name="end_date" value="{{ end_date }}" max="{{ today }}">
        </div>

        <button type="submit">Lọc</button>
    </form>
</div>

<div class="stats-box">
    <div class="card">
        <h3>Tổng doanh thu</h3>
        <p>{{ "{:,.0f}".format(total_revenue) }} VNĐ</p>
    </div>

    <div class="card">
        <h3>Số lượt đặt</h3>
        <p>{{ total_bookings }}</p>
    </div>
</div>

<div class="chart-container">

    <div class="chart-buttons">
        <button onclick="showBar()">Biểu đồ cột</button>
        <button onclick="showPie()">Biểu đồ tròn</button>
    </div>

    <canvas id="chart"></canvas>

</div>

</div>

<script>
let chart;

const labels = {{ labels | tojson }};
const dataValues = {{ values | tojson }};

function showBar() {
    if (chart) chart.destroy();
    chart = new Chart(document.getElementById('chart'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Doanh thu',
                data: dataValues
            }]
        }
    });
}

function showPie() {
    if (chart) chart.destroy();
    chart = new Chart(document.getElementById('chart'), {
        type: 'pie',
        data: {
            labels: labels,
            datasets: [{
                data: dataValues
            }]
        }
    });
}

showBar();

const startDate = document.getElementById("start_date");
const endDate   = document.getElementById("end_date");

// Khi đổi "Từ ngày"
startDate.addEventListener("change", function () {
    if (endDate.value && startDate.value > endDate.value) {
        endDate.value = startDate.value; // auto kéo lên cho hợp lệ
    }
});

// Khi đổi "Đến ngày"
endDate.addEventListener("change", function () {
    if (startDate.value && endDate.value < startDate.value) {
        startDate.value = endDate.value; // auto chỉnh lại
    }
});

startDate.addEventListener("change", function () {
    endDate.min = startDate.value;
});

endDate.addEventListener("change", function () {
    startDate.max = endDate.value;
});
</script>

</body>
</html>
